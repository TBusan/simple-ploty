<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three-Contour Fill Mode Example</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 5px;
            max-width: 250px;
        }
        #controls h3 {
            margin-top: 0;
        }
        #controls label {
            display: block;
            margin: 5px 0;
        }
        #controls select, #controls input {
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="controls">
        <h3>Fill Mode Options</h3>
        <label>
            Color Scale:
            <select id="colorScale">
                <option value="Viridis">Viridis</option>
                <option value="Jet">Jet</option>
                <option value="Hot">Hot</option>
            </select>
        </label>
        <label>
            Level Size:
            <input type="range" id="levelSize" min="0.05" max="0.3" step="0.05" value="0.1">
        </label>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.150.0/examples/jsm/controls/OrbitControls.js';

        import {
            PathFinder,
            ColorScale,
            BUILT_IN_COLORSCALES
        } from '../dist/three-contour.esm.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(
            50,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Generate sample data (Peaks function)
        function generatePeaks(nx, ny) {
            const data = [];
            for (let j = 0; j < ny; j++) {
                const row = [];
                for (let i = 0; i < nx; i++) {
                    const x = (i - nx / 2) / (nx / 6);
                    const y = (j - ny / 2) / (ny / 6);

                    // MATLAB peaks function
                    const z = 3 * Math.pow(1 - x, 2) * Math.exp(-x * x - (y + 1) * (y + 1))
                            - 10 * (x / 5 - Math.pow(x, 3) - Math.pow(y, 5))
                            * Math.exp(-x * x - y * y)
                            - 1 / 3 * Math.exp(-(x + 1) * (x + 1) - y * y);
                    row.push(z);
                }
                data.push(row);
            }
            return data;
        }

        const data = generatePeaks(60, 60);
        const pathFinder = new PathFinder(data);

        let fillGroup = new THREE.Group();
        scene.add(fillGroup);

        // Current settings
        let currentColorScale = 'Viridis';
        let currentLevelSize = 0.1;

        function createFilledContours() {
            // Clear previous
            scene.remove(fillGroup);
            fillGroup = new THREE.Group();

            const colorScale = new ColorScale(currentColorScale);
            const zmin = -8;
            const zmax = 8;

            // Create levels
            const levels = [];
            for (let l = zmin; l <= zmax; l += currentLevelSize) {
                levels.push(l);
            }

            // Coordinate transform
            const transform = (p) => ({
                x: (p.x - 30) * 0.3,
                y: (30 - p.y) * 0.3
            });

            // Calculate bounds
            let minX = -10, maxX = 10, minY = -10, maxY = 10;

            // Step 1: Render background rectangle with lowest color
            const bgColor = colorScale.getColor(0);
            const bgShape = new THREE.Shape();
            const p0 = transform({ x: 0, y: 0 });
            const p1 = transform({ x: 60, y: 0 });
            const p2 = transform({ x: 60, y: 60 });
            const p3 = transform({ x: 0, y: 60 });
            bgShape.moveTo(p0.x, p0.y);
            bgShape.lineTo(p1.x, p1.y);
            bgShape.lineTo(p2.x, p2.y);
            bgShape.lineTo(p3.x, p3.y);
            bgShape.closePath();

            const bgGeometry = new THREE.ShapeGeometry(bgShape);
            const bgMaterial = new THREE.MeshBasicMaterial({
                color: bgColor,
                side: THREE.DoubleSide
            });
            const bgMesh = new THREE.Mesh(bgGeometry, bgMaterial);
            bgMesh.renderOrder = 0;
            fillGroup.add(bgMesh);

            // Step 2: Render each level's closed paths (from low to high)
            // Each level renders polygons that cover the previous layer
            for (let i = 0; i < levels.length; i++) {
                const level = levels[i];
                const paths = pathFinder.findPaths(level);

                // Color for this level
                const normalizedValue = (level - zmin) / (zmax - zmin);
                const color = colorScale.getColor(normalizedValue);

                for (const path of paths) {
                    if (path.points.length < 3) continue;
                    if (!path.isClosed) continue;

                    const shape = new THREE.Shape();
                    const points = path.points;
                    const tp0 = transform(points[0]);
                    shape.moveTo(tp0.x, tp0.y);

                    for (let j = 1; j < points.length; j++) {
                        const tp = transform(points[j]);
                        shape.lineTo(tp.x, tp.y);
                    }
                    shape.closePath();

                    const geometry = new THREE.ShapeGeometry(shape);
                    const material = new THREE.MeshBasicMaterial({
                        color,
                        side: THREE.DoubleSide
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    // Higher levels have higher render order (rendered on top)
                    mesh.renderOrder = i + 1;
                    fillGroup.add(mesh);
                }
            }

            scene.add(fillGroup);
        }

        // Initial render
        createFilledContours();

        // UI handlers
        document.getElementById('colorScale').addEventListener('change', (e) => {
            currentColorScale = e.target.value;
            createFilledContours();
        });

        document.getElementById('levelSize').addEventListener('input', (e) => {
            currentLevelSize = parseFloat(e.target.value);
            createFilledContours();
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
