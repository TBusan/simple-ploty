<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>线条模式 | zrender-contour</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #f9f9f9; }
    .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem 0; color: #333; }
    .description { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
    #main { border: 1px solid #ddd; background: #fff; height: 400px; border-radius: 4px; }
    .code-block { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 4px; overflow-x: auto; margin-top: 1.5rem; }
    pre { margin: 0; font-size: 13px; font-family: 'Consolas', 'Monaco', monospace; }
    .keyword { color: #569cd6; }
    .string { color: #ce9178; }
    .number { color: #b5cea8; }
    .comment { color: #6a9955; }
    .nav { margin-bottom: 1rem; }
    .nav a { color: #0066cc; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav"><a href="../index.html">← 返回示例列表</a></div>
    <h1>线条模式 (lines)</h1>
    <p class="description">
      只显示等值线条，不进行填充。每条线使用不同颜色表示数值。
    </p>
    <div id="main"></div>
    <div class="code-block">
      <pre><span class="comment">// 线条模式：只绘制 Polyline</span>
<span class="keyword">const</span> line = <span class="keyword">new</span> zrender.Polyline({
  shape: { points: points },
  style: {
    stroke: color,
    lineWidth: <span class="number">2</span>,
    fill: <span class="string">'none'</span>
  }
});</pre>
    </div>
  </div>

  <script type="module">
    import * as zrender from 'https://cdn.jsdelivr.net/npm/zrender@5/+esm';
    import { MarchingSquares, PathFinder } from '../../dist/zrender-contour.esm.js';
    import { rippleGrid } from '../shared/data.js';

    const data = rippleGrid;
    const levels = [-0.8, -0.6, -0.4, -0.2, 0, 0.2, 0.4, 0.6, 0.8];

    // 初始化 ZRender
    const zr = zrender.init(document.getElementById('main'));
    const width = zr.getWidth();
    const height = zr.getHeight();
    const margin = 40;

    const nx = data.z[0].length, ny = data.z.length;
    const scaleX = (width - 2 * margin) / nx;
    const scaleY = (height - 2 * margin) / ny;

    // 颜色映射
    function getColor(level) {
      const t = (level + 0.8) / 1.6; // 归一化到 0-1
      if (t < 0.5) {
        return `rgb(${Math.round(100 + 155 * t * 2)}, ${Math.round(50 + 150 * t * 2)}, ${Math.round(200 - 100 * t * 2)})`;
      } else {
        return `rgb(${Math.round(200 + 55 * (t - 0.5) * 2)}, ${Math.round(200 - 50 * (t - 0.5) * 2)}, ${Math.round(100 - 50 * (t - 0.5) * 2)})`;
      }
    }

    // 计算等值线
    const ms = new MarchingSquares(data, levels);
    const levelInfo = ms.computeLevels();

    // 渲染线条
    for (const level of levels) {
      const info = levelInfo.get(level);
      if (!info) continue;

      const finder = new PathFinder(data, info);
      const result = finder.findAllPaths();
      const color = getColor(level);

      for (const path of [...result.paths, ...result.edgePaths]) {
        if (path.length < 2) continue;
        const points = path.map(p => [
          margin + p.x * scaleX,
          margin + p.y * scaleY
        ]);
        if (result.paths.includes(path)) points.push(points[0]);

        zr.add(new zrender.Polyline({
          shape: { points },
          style: { stroke: color, lineWidth: 2, fill: 'none' }
        }));
      }
    }

    // 边框
    zr.add(new zrender.Rect({
      shape: { x: margin, y: margin, width: nx * scaleX, height: ny * scaleY },
      style: { stroke: '#333', lineWidth: 1, fill: 'none' }
    }));
  </script>
</body>
</html>
